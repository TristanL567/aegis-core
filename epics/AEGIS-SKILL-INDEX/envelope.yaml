epic_id: AEGIS-SKILL-INDEX
goal: >
  Add a canonical skill-library manifest under skills/, category indexes for
  roles, procedures, and references, standardized procedure-routing sections
  for role files that lack them, and validator checks for index completeness
  and procedure reachability. Preserve existing skill behavior.
business_context: >
  AEGIS-OVERHAUL made prompts discoverable and mechanically closed, but the
  skills library still requires agents to know where to look. A current audit
  found that many procedure skills are not named by any role, and no category
  README exists for roles, procedures, or references.
user_or_operator_outcome: >
  An agent can confirm that a role, procedure, or reference exists from a
  manifest before opening it; a human can inspect all skill categories without
  scanning every skill file; CI catches new skill folders that lack index rows.
design_concept: >
  skills/README.md is the canonical agent-facing manifest. The category README
  files are generated from existing frontmatter and role routing references so
  they can be mechanically checked. References are knowledge drawers, not
  triggerable skills. Procedures are composed by roles or explicitly marked as
  standalone metadata when no fixed owning role is intended.
architecture_boundary: >
  Additive skill-library discovery work only. Writable areas are skill index
  READMEs, procedure frontmatter metadata, append-only procedure-routing
  sections in role files that lack the section, the skill-library validator,
  optional skill architecture docs, and this epic workspace. Do not alter
  contracts, prompts, execution runbooks, templates, reference bodies,
  procedure bodies, discipline content, or existing role behavior.
success_signal: >
  skills/README.md and category README files exist and are complete; every role
  file has an explicit Procedure Routing section; validate_skill_library.py
  verifies index completeness and reports procedure reachability; default
  validation passes; strict reachability behavior is proven in scratch tests.
branch: development-skills
base: main
operating_mode: relay
autonomy_policy: manual
human_checkpoint_tickets:
  - AEGIS-SKI-000
  - AEGIS-SKI-001
  - AEGIS-SKI-002
  - AEGIS-SKI-003
  - AEGIS-SKI-004
  - AEGIS-SKI-005
