planning_notes:
  - >
    This intersects directly with the prior skill-index recommendation:
    top-level skill manifest, category READMEs, role-mediated procedure
    selection, references-as-drawers language, and validator enforcement.
  - >
    The attached branch name was normalized to the prior operator choice
    development-skills.
  - >
    The attached autonomy policy was normalized to manual; every ticket is
    therefore a human checkpoint.
  - >
    The attached plan only added Procedure Routing sections to three roles.
    This version expands SKI-002 to all role files that currently lack that
    heading so the routing convention is uniform.
  - >
    The final strict-mode verification is recorded as behavior evidence; it is
    not required to exit 0 while unresolved orphan findings remain.
  - >
    AEGIS-SKI-000 was added after the first SKI-001 relay blocked because no
    existing worker role safely owned skill-library metadata edits.
  - >
    The external skill-cleaner project is optional research input for inventory
    and audit concepts only; do not vendor or import external behavior unless a
    future ticket explicitly allows that integration.
