  - AEGIS-SKILL-INDEX
merge_policy:
  strategy: rebase_then_merge
  base: main
  requires_epic_validator: true
  requires_human_approval: true

planning_notes:
  - >
    Strict skill validation is intentionally out of scope except for recording
    that it fails on the known AEGIS-SKILL-WIRING backlog.
  - >
    `tools/__pycache__/` is a local generated artifact from validation runs and
    should not be staged.
