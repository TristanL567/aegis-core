epic_id: AEGIS-VALIDATION-HARDENING
goal: >
  Resolve repository validation gaps found after AEGIS-SKILL-INDEX: make ticket
  scope validation work with canonical plain YAML ticket envelopes, repair
  invalid historical ticket YAML, clean stale evidence and generated-file
  hygiene, document commit traceability expectations, and run a final
  conformance pass.
business_context: >
  AEGIS now has prompt and skill validators, but the latest full-repo audit
  exposed validation surfaces that still depend on manual judgment or contain
  stale artifacts. The pre-commit scope hook can resolve YAML ticket files but
  the validator rejects them, several historical ticket files are not parseable
  YAML, and commit traceability remains a convention rather than a documented
  decision point.
user_or_operator_outcome: >
  Operators can run repository validators without unexplained failures, use
  plain YAML ticket envelopes with the scope validator and hook templates, trust
  historical ticket envelopes to parse, avoid staging generated bytecode, and
  understand whether one-commit-per-ticket is a convention or an enforced rule.
design_concept: >
  Keep this as validation hardening rather than new architecture. Fix concrete
  parse/tool mismatches first, then clarify process gaps without weakening the
  existing AEGIS kernel. Strict skill-orphan failure remains a known backlog for
  AEGIS-SKILL-WIRING, not a defect in this epic.
architecture_boundary: >
  Changes are limited to validation tooling, related procedure/docs text,
  historical ticket-envelope syntax repairs, evidence/gitignore hygiene,
  commit-traceability documentation, and this epic workspace. Do not change
  prompt behavior, role topology, procedure semantics, or unresolved skill
  wiring decisions.
success_signal: >
  validate_ticket_scope.py accepts both plain YAML envelopes and markdown
  frontmatter envelopes; all tracked epic/template YAML parses; default prompt
  and skill validators pass; strict skill validation still fails only on the
  documented residual orphan backlog; generated pycache is ignored; stale
  final-evidence text is corrected; commit traceability limits are documented.
branch: aegis-validation-hardening
base: main
operating_mode: relay
autonomy_policy: manual
human_checkpoint_tickets:
  - AEGIS-VH-001
  - AEGIS-VH-002
  - AEGIS-VH-003
  - AEGIS-VH-004
  - AEGIS-VH-005
epic_allowed_areas:
  - tools/validate_ticket_scope.py
  - docs/testing.md
  - docs/skill-architecture.md
  - README.md
  - .gitignore
  - skills/procedures/ticket-scope-validation/SKILL.md
  - skills/procedures/clean-commit/SKILL.md
  - execution/templates/hooks/README.md
  - execution/templates/hooks/pre-commit
  - execution/runbooks/clean-commit.md
  - contracts/kernel.md
  - contracts/ticket-contract.md
  - epics/AEGIS-PLANNER-AGENT-CONTRACT/tickets/AEGIS-PLANNER-AGENT-001.yaml
  - epics/AEGIS-PLANNER-AGENT-CONTRACT/tickets/AEGIS-PLANNER-AGENT-003.yaml
  - epics/AEGIS-PLANNER-AGENT-CONTRACT/tickets/AEGIS-PLANNER-AGENT-004.yaml
  - epics/AEGIS-SKILL-INDEX/final-conformance-evidence.md
  - epics/AEGIS-VALIDATION-HARDENING/
epic_must_not_touch:
