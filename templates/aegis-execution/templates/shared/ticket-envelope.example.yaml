ticket_id: EXAMPLE-TICKET-001
goal: Add a provider-neutral execution example for a bounded workflow.
dependencies:
  - EXAMPLE-TICKET-000 completed
allowed_areas:
  - templates/example-workflow/
  - tests/example-workflow/
must_not_touch:
  - contracts/
  - provider-specific-runbooks/
requirements:
  - Keep the example generic across supported execution providers.
  - Use existing repository conventions for file names and formatting.
  - Report any boundary conflict before modifying restricted areas.
non_goals:
  - Do not change canonical contracts.
  - Do not add provider-specific execution behavior.
acceptance_criteria:
  - The example includes all required ticket fields.
  - The example can be understood without provider-specific runbooks.
  - Verification guidance is explicit and scoped to the allowed areas.
manual_verification_required: true
manual_verification_steps:
  - Confirm the example is provider-neutral.
  - Confirm all changed files are inside the allowed areas.
verification_commands:
  - git diff -- templates/example-workflow/ tests/example-workflow/
completion_report_required: true
